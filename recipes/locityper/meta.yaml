{% set name = "locityper" %}
{% set version = "1.5.4" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/tprodanov/locityper/archive/refs/tags/v{{ version }}.tar.gz
  sha256: 120b11af786a18f43fa20800e42ef606826e968a762e92551746aeb039c26716

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('cxx') }}
    - cmake
    - make
    - pkg-config
    - clang =21 # [linux]
    - clangxx =21 # [linux]
  host:
    - clangdev =21 # [linux]
    - clangdev # [osx]
    - pkg-config
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
    # - htslib >=1.19
  run:
    - python
    - libgomp  # [linux]
    - llvm-openmp  # [osx]
    - samtools >=1.19
    - kmer-jellyfish >=1.0
    - minimap2 >=2.26
    - strobealign >=0.17
    - pysam

test:
  commands:
    - locityper version

about:
  summary: "Targeted genotyper for complex polymorphic loci from short and long read WGS."
  home: "https://github.com/tprodanov/locityper"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  dev_url: "https://github.com/tprodanov/locityper"
  doc_url: "https://locityper.vercel.app"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
  skip-lints:
    - compiler_needs_stdlib_c
