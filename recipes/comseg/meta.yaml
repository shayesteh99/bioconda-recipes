{% set name = "comseg" %}
{% set version = "1.8.5" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/c/comseg/comseg-{{ version }}.tar.gz
  sha256: a8305ffebf1b73e6321f5595e3009fb7a5fb2e349ebb23bc1d865571beeb79bf

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
  - {{ pin_subpackage("comseg", max_pin="x.x.x") }}

requirements:
  host:
    - python >=3.8
    - setuptools >=61.0
    - pip
  run:
    - python >=3.8
    - anndata >=0.9.2
    - h5py >=3.9.0
    - networkx >=2.8.4
    - numba >=0.55.2
    - numpy >=1.22.4
    - pandas >=1.4.0
    - pillow >=10.0.1
    - pyarrow >=13.0.0
    - rpds-py >=0.10.3
    - scanpy >=1.9.5
    - scikit-image >=0.21.0
    - scikit-learn >=1.0.1
    - scikit-misc >=0.2.0
    - scipy >=1.8.1
    - seaborn >=0.12.2
    - tifffile >=2023.7.10
    - tinycss2 >=1.2.1
    - tqdm >=4.66.1
    - traitlets >=5.11.2
    - umap-learn >=0.5.4
    - webencodings >=0.5.1
    - zipp >=3.16.2
    - alphashape >=1.3.1
    - igraph >=0.11.5
    - leidenalg >=0.10.2

test:
  imports:
    - comseg
    - skmisc.loess # just to show that scikit-misc is properly installed
  commands:
    # pip check is disabled: the bioconda scikit-misc package reports its
    # version as 0.0.0, which makes `pip check` falsely fail against
    # comseg's scikit-misc>=0.2.0 constraint. The package is installed and
    # importable (verified by the skmisc.loess import test above).
    # - pip check
  requires:
    - pip
    - python

about:
  home: https://pypi.org/project/ComSeg/
  summary: single cell RNA profiling analysis of imaging-based spatial transcriptomics data
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/fish-quant/ComSeg
  doc_url: https://comseg.readthedocs.io

extra:
  recipe-maintainers:
    - nilchia
