{% set name = "ga4gh.vrs" %}
{% set version = "2.3.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ga4gh_vrs-{{ version }}.tar.gz
  sha256: fda41d36ed32c168a9133efca908bef1b14bb75bd6e2f76986c0be4ff0e80e3a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage('ga4gh.vrs', max_pin="x") }}

requirements:
  host:
    - python >=3.10
    - setuptools >=65.3
    - setuptools-scm >=8
    - pip
  run:
    - python >=3.10
    - click
    - pydantic >=2.1,<3.dev0
    - pysam
    - bioutils >=0.6
    - biocommons.seqrepo >=0.5.1
    - dill
    - hgvs >=1.5.5,<2.0
    - requests
    - canonicaljson
    - typing_extensions

test:
  imports:
    - ga4gh
  commands:
    - vrs-annotate --help

about:
  home: https://vrs.ga4gh.org
  summary: GA4GH Variation Representation Specification (VRS) reference implementation
  dev_url: https://github.com/ga4gh/vrs-python
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - emmcauley
