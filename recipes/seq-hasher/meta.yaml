{% set version = "0.5.0" %}

package:
  name: seq-hasher
  version: {{ version }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage("seq-hasher", max_pin="x.x") }}

source:
  url: https://github.com/apcamargo/seq-hasher/archive/v{{ version }}.tar.gz
  sha256: 0d759827dd145f1f17f6100e05106ba0f8031490f54e38b8dc1408df7aa119a6

requirements:
  build:
    - {{ stdlib('c') }}
    - {{ compiler('rust') }} 
    - cargo-bundle-licenses

test:
  commands:
    - seq-hasher --help

about:
  home: "https://github.com/apcamargo/seq-hasher"
  license: MIT
  license_family: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml 
  summary: "Compute hash digests for DNA sequences in a FASTA file, with support for circular permutations."
  dev_url: "https://github.com/apcamargo/seq-hasher"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
