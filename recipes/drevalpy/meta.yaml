{% set name = "drevalpy" %}
{% set version = "1.5.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/daisybio/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: ef6afc448674738aebfd73428aa8f25c72fd7304ac93682692ddce9caeb5aaef

build:
  entry_points:
    - drevalpy = drevalpy.cli.main:cli_main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage('drevalpy', max_pin="x") }}

requirements:
  host:
    - python >=3.11,<3.14
    - poetry-core
    - pip
  run:
    - python >=3.11,<3.14
    - numpy >=1.20
    - scipy
    - scikit-learn >=1.4
    - pandas
    - networkx
    - pyyaml
    - pytorch-lightning >=2.5
    - pytorch >=2.1
    - torch-geometric
    - flaky
    - requests
    - plotly
    - matplotlib-base
    - importlib-resources
    - scikit-posthocs
    - curve-curator
    - toml >=0.10.2,<0.11.0
    - poetry >=2.0.1,<3.0.0
    - starlette >=0.49.1
    - wandb >=0.24.0
    - typer >=0.26
    - ray
  run_constrained:
    - pydantic >=2.5
    - xgboost >=3.2.0
    - gseapy >=1.1.0
    - subword-nmt >=0.3.8

test:
  imports:
    - drevalpy
  commands:
    - drevalpy --help
    - drevalpy report --help

about:
  home: https://github.com/daisybio/drevalpy
  summary: Drug response evaluation of drug response prediction models in a fair setting
  license: MIT
  license_file: LICENSE
  doc_url: https://drevalpy.readthedocs.io/en/latest/index.html
  dev_url: https://github.com/daisybio/drevalpy

extra:
  recipe-maintainers:
    - JudithBernett
    - PascalIversen
  identifiers:
    - https://doi.org/10.1038/s41467-026-72903-w
