{% set version = "26.0.1" %}
{% set sha256 = "e4a6fb3c26d1ff426058b1adcb1a00b65c4d46343d81f84a92607d62e7247afb" %}
{% set galaxy_version = version.split(".")[:2]|join(".") %}

package:
  name: galaxy-data
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/g/galaxy-data/galaxy_data-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 1
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage('galaxy-data', max_pin="x") }}
  entry_points:
    - galaxy-build-objects=galaxy.model.store.build_objects:main
    - galaxy-load-objects=galaxy.model.store.load_objects:main
    - galaxy-manage-db=galaxy.model.orm.scripts:manage_db
    - galaxy-prune-histories=galaxy.model.scripts:prune_history_table
    - galaxy-delete-sessions = galaxy.model.scripts:delete_galaxy_sessions
    - galaxy-delete-job-metrics = galaxy.model.scripts:delete_job_metrics

requirements:
  host:
    - pip
    - python >={{ python_min }}
    - setuptools
  run:
    - python >={{ python_min }}
    - galaxy-files >={{ galaxy_version }}
    - galaxy-objectstore >={{ galaxy_version }}
    - galaxy-schema >={{ galaxy_version }}
    - galaxy-tool-util >={{ galaxy_version }}
    - galaxy-util >={{ galaxy_version }}
    - alembic
    - bdbag >=1.6.3
    - bx-python
    - dnspython
    - galaxy_sequence_utils
    - h5grove >=1.2.1
    - h5py
    - ijson
    - isa-rwval >=0.10.11
    - python-isal >=1.7.0
    - markupsafe
    - mrcfile
    - msal
    - numpy
    - parsley
    - pycryptodome
    - pydantic >=2.7.4
    - email-validator
    - pydicom
    # - pylibmagic # Pending https://github.com/kratsg/pylibmagic/issues/54
    - pypng
    - pysam >=0.21
    - python-magic
    - rocrate <0.15.0
    - social-auth-core >=4.5.0
    - sqlalchemy >=2.0.37,<2.1
    - tifffile
    - typing-extensions

test:
  imports:
    - galaxy
    - galaxy.datatypes
    - galaxy.datatypes.dataproviders
    - galaxy.datatypes.images
    - galaxy.exceptions
    - galaxy.model
    - galaxy.quota
    - galaxy.security

about:
  home: https://galaxyproject.org
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: The Galaxy models, datatype framework, and datatype implementations.
  doc_url: https://docs.galaxyproject.org
  dev_url: https://github.com/galaxyproject/galaxy

extra:
  identifiers:
    - biotools:galaxy
    - doi:10.1093/nar/gky379
  recipe-maintainers:
    - bernt-matthias
    - nsoranzo
