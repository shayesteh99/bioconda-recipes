{% set name = "lima" %}
{% set version = "26.2.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://github.com/PacificBiosciences/barcoding/releases/download/v{{ version }}/lima.tar.gz
  sha256: 529e147b3791ab6ec7632c9154f8fe9e46df3af1b4d44f929d6a2038db2389fd

build:
  number: 0
  skip: True  # [osx]
  binary_relocation: False
  run_exports:
    - {{ pin_subpackage('lima', max_pin='x.x') }}

test:
  commands:
    - lima -h
    - lima-undo -h

about:
  home: https://lima.how
  license: BSD-3-Clause-Clear
  summary: lima - The PacBio Barcode Demultiplexer

extra:
  recipe-maintainers:
    - armintoepfer
    - pb-dseifert
  skip-lints:
    #repackaged binary
    - should_be_noarch_generic
