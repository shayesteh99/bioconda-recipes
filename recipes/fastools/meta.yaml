{% set name = "fastools" %}
{% set version = "1.1.7" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/fastools-{{ version }}.tar.gz
  sha256: 71e41451f188b32758e51c0b3ac8225bf32f7930d160199ea933d63b02f75c20

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python
    - pip
    - hatchling
  run:
    - python
    - biopython >=1.72
    - python-levenshtein >=0.12.0
    - regex >=2020.10.11

test:
  imports:
    - fastools
  commands:
    - pip check
    - fastools --help
    - split_fasta --help
  requires:
    - pip

about:
  home: https://git.lumc.nl/j.f.j.laros/fastools
  summary: FASTA/FASTQ analysis and manipulation toolkit.
  license: MIT
  license_file: LICENSE.md

extra:
  recipe-maintainers:
    - acaprez
