{% set version="1.3.2" %}
package:
  name: wisecondorx
  version:  {{ version }}

source:
  url: https://github.com/CenterForMedicalGeneticsGhent/wisecondorX/archive/v{{ version }}.tar.gz
  sha256: 0311d8920b281ef75aef410c424e97e07fff5ba6feb64781abc2675f6b658f34

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps -vv"
  run_exports:
    - {{ pin_subpackage('wisecondorx', max_pin="x") }}

requirements:
  host:
    - python >=3.10
    - setuptools
  run:
    - pandas >=3.0
    - python >=3.6
    - pysam >=0.23
    - scipy >=1.17
    - scikit-learn >=1.8
    - numpy >=2.4
    - matplotlib-base >=3.10
    - r-jsonlite >=1.8
    - bioconductor-dnacopy >=1
    - typer

test:
  imports:
    - wisecondorx
  commands:
    - WisecondorX --help
    - WisecondorX convert --help
    - WisecondorX gender --help
    - WisecondorX newref --help
    - WisecondorX predict --help

about:
  home: https://github.com/CenterForMedicalGeneticsGhent/wisecondorX
  license: Attribution-NonCommercial-ShareAlike CC BY-NC-SA
  summary: 'WIthin-SamplE COpy Number aberration DetectOR, including sex chromosomes'
