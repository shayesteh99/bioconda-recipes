{% set version = "26.0.1" %}
{% set sha256 = "b2e66b1e4dc61f089f0f923fcce740679b526cfed91531f27fa103086d0e13a0" %}
{% set galaxy_version = version.split(".")[:2]|join(".") %}

package:
  name: galaxy-files-full
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/g/galaxy-files/galaxy_files-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage('galaxy-files-full', max_pin="x") }}

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - galaxy-tool-util-models >={{ galaxy_version }}
    - galaxy-util >={{ galaxy_version }}
    - fs
    - pydantic >=2.7.4
    - typing-extensions
    - fs.webdavfs
    - webdavclient3
    - fs.sshfs
    - fs.googledrivefs
    - fs-gcsfs
    - google-cloud-storage
    
test:
  imports:
    - galaxy
    - galaxy.files

about:
  home: "https://galaxyproject.org"
  license: MIT
  license_family: MIT
  license_file: "LICENSE.txt"
  summary: "The Galaxy file sources framework and default plugins."
  doc_url: "https://docs.galaxyproject.org"
  dev_url: "https://github.com/galaxyproject/galaxy"

extra:
  identifiers:
    - biotools:galaxy
    - doi:10.1093/nar/gky379
  recipe-maintainers:
    - bernt-matthias
    - bgruening
