{% set name = "obonet" %}
{% set version = "1.3.0" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz"
  sha256: 7c128bfe455bd7a134a3e6122e89338b896b4dea116511a850cec1a2e2a98294

build:
  number: 0
  noarch: python
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv"
  run_exports:
    - {{ pin_subpackage('obonet', max_pin="x") }}

requirements:
  host:
    - pip
    - python
    - setuptools
  run:
    - networkx
    - python

test:
  imports:
    - obonet

about:
  home: "https://github.com/dhimmel/obonet"
  license: BSD-2-Clause-Patent
  license_family: BSD
  license_file: LICENSE.md
  summary: "Parse OBO formatted ontologies into networkx"
  doc_url: "https://github.com/dhimmel/obonet/README.md"
  dev_url: "https://github.com/dhimmel/obonet"
