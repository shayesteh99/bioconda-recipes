{% set name = "folddisco" %}
{% set version = "2-9375a2d" %}
{% set sha256 = "44ba525e9b563b73d92b7e04f10b6c1e989c5a8074714a372c85381d5816c06c" %}

package:
  name: {{ name }}
  version: {{ version|replace("-", ".")  }}

source:
  url: https://github.com/steineggerlab/folddisco/archive/{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  run_exports:
    - {{ pin_subpackage('folddisco', max_pin="x") }}

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ compiler('cxx') }}
    - {{ stdlib('c') }}
    - cargo-bundle-licenses
    - cmake
    - make
    - pkg-config

test:
  commands:
    - folddisco > /dev/null

about:
  home: "https://github.com/steineggerlab/folddisco"
  summary: "Folddisco: fast indexing and search of discontinuous motifs in protein structures."
  license: "GPL-3.0-or-later"
  license_family: GPL3
  license_file: "LICENSE.md"
  dev_url: "https://github.com/steineggerlab/folddisco"
  doc_url: "https://github.com/steineggerlab/folddisco/blob/{{ version }}/README.md"

extra:
  identifiers:
    - doi:10.1038/s41587-026-03162-9
    - doi:10.1101/2025.07.06.663357
  recipe-maintainers:
    - khb7840
    - milot-mirdita
    - martin-steinegger
  additional-platforms:
    - linux-aarch64
    - osx-arm64
