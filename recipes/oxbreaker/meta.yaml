{% set name = "oxbreaker" %}
{% set version = "1.0.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://gitlab.com/rc-reding/OxBreaker/-/archive/{{ version }}/OxBreaker-{{ version }}.tar.bz2
  sha256: c06967179ab9e5e06d550b5847d20e3583f00bd51d2bbf2600012eaf019323a3

build:
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}
  noarch: python
  script: {{ PYTHON }} -m pip install . -vvv --no-deps --no-build-isolation --no-cache-dir
  entry_points:
    - oxbreaker = oxbreaker.gui:main

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools
  run:
    - python >=3.9
    - pygobject
    - gtk4
    - gobject-introspection
    - cairo
    - pango
    - harfbuzz
    - glib
    - nextflow 25.*

test:
  commands:
    - oxbreaker --help
    - nextflow -version

about:
  home: "https://gitlab.com/rc-reding/OxBreaker"
  license: "LGPL-2.1-only"
  license_family: LGPL
  license_file: LICENSE
  summary: "GTK4 GUI wrapper that launches a Nextflow pipeline"
  description:
    OxBreaker is a GTK4-based interface that collects parameters and launches a Nextflow pipeline.
    The package bundles the Nextflow project files and assets so they are available at runtime.
  dev_url: "https://gitlab.com/rc-reding/OxBreaker"

extra:
  recipe-maintainers:
    - rc-reding
  identifiers:
    - doi:10.64898/2026.03.18.709804
