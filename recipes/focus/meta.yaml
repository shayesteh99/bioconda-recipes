{% set name = "focus" %}
{% set version = "2.0.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/metageni/FOCUS/archive/v{{ version }}.tar.gz
  sha256: b1a098abbdf4c981493ff3829f315f5407b1f07eb01915ddf9cc378346cf7af7

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -q
  run_exports:
    - {{ pin_subpackage("focus", max_pin="x") }}

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools >=68
    - wheel
  run:
    - python >=3.8
    - click >=8.0
    - numpy >=1.12.1
    - scipy >=0.19.0
    - jellyfish  # from bioconda

test:
  imports:
    - focus_app
    - focus_app.focus
    - focus_app.cli
  commands:
    - focus --help
    - focus --version

about:
  home: https://github.com/metageni/FOCUS
  license: GPL-3.0-or-later
  license_file: COPYING
  summary: FOCUS - An Agile Profiler for Metagenomic Data
  description: |
    FOCUS uses k-mer counting (Jellyfish) and non-negative least squares (NNLS)
    to estimate the relative abundance of organisms in a metagenome without
    assembly or read mapping.

extra:
  recipe-maintainers:
    - metageni
