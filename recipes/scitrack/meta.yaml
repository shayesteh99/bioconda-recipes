{% set name = "scitrack" %}
{% set version = "2026.6.8" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/scitrack-{{ version }}.tar.gz
  sha256: d4f0ab7e8621a333fc567ff59be365cc3470e57cf41b0b2f30419adf23803e2a

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  number: 0
  run_exports:
    - {{ pin_subpackage('scitrack', max_pin=None) }}

requirements:
  host:
    - python >=3.9
    - pip
    - flit-core
    - hatchling
  run:
    - python >=3.9

test:
  imports:
    - scitrack

about:
  home: https://github.com/HuttleyLab/scitrack
  summary: "SciTrack provides basic logging capabilities to track scientific computations."
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  dev_url: https://github.com/HuttleyLab/scitrack
