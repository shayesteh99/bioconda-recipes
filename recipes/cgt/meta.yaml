{% set name = "cgt" %}
{% set version = "0.1.1" %}

package:
  name: {{ name|lower}}
  version: {{ version }}

source:
  url: https://github.com/bacpop/{{ name }}/archive/v{{ version }}.tar.gz
  sha256: 3a459971ebc8c9f2ddcc05682250a85f15c97b2cafad45ab13cecfe5003db25d

build:
  number: 0
  script: "cargo install --no-track --locked --verbose --root \"${PREFIX}\" --path ."
  run_exports:
    - {{ pin_subpackage("cgt", max_pin=None) }}

requirements:
  build:
    - {{ compiler('rust') }}
    - {{ stdlib('c') }}
    - cargo-bundle-licenses

test:
  commands:
    - cgt_bacpop -V

about:
   home: https://github.com/bacpop/cgt
   license: Apache-2.0
   license_family: APACHE
   license_file: LICENSE.txt
   summary: Calculate a core genome threshold (cgt) from metagenome data
