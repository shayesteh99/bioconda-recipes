{% set name = "fxsplit" %}
{% set version = "0.0.5" %}

package:
 name: {{ name }}
 version: {{ version }}

source:
 url: https://github.com/alejandrogzi/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
 sha256: 5bacdf8ad19655844d86a332b978ce7dc20dda6db94c53830673b2af1f937c66

build:
 number: 0
 run_exports:
    - {{ pin_subpackage('fxsplit', max_pin="x.x") }}

requirements:
  build:
    - {{ compiler("cxx") }}
    - {{ compiler("rust") }}
    - {{ stdlib("c") }}
    - cargo-bundle-licenses
    - pkg-config

test:
 commands:
   - fxsplit --help
   - fxsplit --version

about:
 home: "https://github.com/alejandrogzi/fxsplit"
 license: "Apache-2.0"
 license_family: APACHE
 summary: "split FASTX (and 2bit) into N chunks/files/headers"
 dev_url: "https://github.com/alejandrogzi/fxsplit"

extra:
  recipe-maintainers:
    - alejandrogzi
  additional-platforms:
    - linux-aarch64
    - osx-arm64
