{% set name = "isa-rwval" %}
{% set version = "0.10.11" %}
{% set sha256 = "f2c953b36e7982c4aaf2e232687945033bb80ecc860ce4c5abe729aedc2d28ad" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  noarch: python
  number: 0
  script: "{{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv"
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  host:
    - pip
    - python >=3.9
    - setuptools >=77.0.1
  run:
    - networkx >=2.5
    - numpy
    - pandas
    - matplotlib-base
    - python >=3.9

test:
  imports:
    - isatools.model
    - isatools.isatab
    - isatools.isajson
    - isatools.isaviz

about:
  home: https://isa-tools.org/
  license: CPAL
  license_file: LICENSE.txt
  summary:  ISA metadata tracking tools
  dev_url: https://github.com/ISA-tools/isa-rwval

extra:
  recipe-maintainers:
    - bernt-matthias
    - nsoranzo
