{% set name = "beacon2-ri-tools" %}
{% set version = "2.1.2" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  - url:   https://github.com/EGA-archive/{{ name }}-v2/archive/refs/tags/v{{ version }}.zip
    sha256: "e01feeff2844d3e3aa71d7e86dbefe7b5a4ae349160279d148a6849b2f5e7161"
    folder: main_src
build:
  noarch: generic
  number: 0
  run_exports:
        - {{ pin_subpackage('beacon2-ri-tools', max_pin="x") }}

requirements:
  host:
    - python >={{ python_min }},<3.14
  run:
    - python >={{ python_min }},<3.14
    - annotated-types >=0.6.0
    - certifi >=2023.7.22
    - charset-normalizer >=3.3.1
    - openpyxl >=3.1.2
    - pandas >=2.1.2
    - python-dateutil >=2.8.2
    - tqdm >=4.66.1
    - cyvcf2 >=0.30.28
    - pymongo >=4.6.1
    - pydantic >=2.6.4
    - pydantic-core >=2.16.3
    - typing_extensions >=4.11.0
    - coverage >=7.6.0
    - rfc3339-validator >=0.1.4
    - ga4gh.vrs >=2.3.1
    - refgendetector >=3.0.4
    - pyyaml >=6.0.1
    
test:
  commands:
    - csv_to_bff.py --help
    - genomicVariations_vcf.py --help
    - genomicVariations_postprocessing.py --help
    - individuals_to_cohorts_csv.py --help
    - remove_dataset.py --help
    - update_record.py --help
  requires:
    - pip
    - python >={{ python_min }},<3.14

about:
  home: https://github.com/EGA-archive/beacon2-ri-tools-v2/tree/main
  license: Apache-2.0
  license_file: LICENSE.txt
  summary: "Package of tools designed to simplify the population of a Beacon v2 mongoDB database"
  description: "Beacon2 RI Tools v2 is a software created with the main goal of generating BFF data from .csv or .vcf (and probably more types of datafiles in the future). This is based on the first beacon ri tools. Currently, the supported input formats are VCF, CSV, and Phenopackets. These formats are converted to BFF (Beacon Friendly Format JSON, following Beacon v2 official specifications) and inserted into a Beacon database." 

extra:
  recipe-maintainers:
    - costero-e
    - khaled196
