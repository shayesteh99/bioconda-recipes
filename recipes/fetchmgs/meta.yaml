{% set name = "fetchmgs" %}
{% set version = "2.1.3" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/fetchmgs-{{ version }}.tar.gz
  sha256: 535f719fbb619bd14fdd8af8b07f3c224f2f2a3d856898e8f1eeb3acf2ea3b4f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}
  number: 0

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - biopython
    - tqdm
    - pyrodigal >=3.6.3.post1
    - pyhmmer >=0.12.0,<0.13.0
    - psutil

test:
  imports:
    - fetchmgs
  commands:
    - pip check
    - fetchMGs 2>&1 | grep 'FetchMGs extracts the'
    - fetchMGs extraction 2>&1 | grep 'fetchMGs extraction'
  requires:
    - pip

about:
  home: https://github.com/motu-tool/FetchMGs
  summary: FetchMGs extracts the 40 marker genes from genomes and metagenomes in an easy and accurate manner.
  license: GPL-3.0-only
  license_file: LICENSE

extra:
  recipe-maintainers:
    - kbseah
