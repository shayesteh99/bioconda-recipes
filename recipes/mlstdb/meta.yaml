{% set name = "mlstdb" %}
{% set version = "1.3.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/mlstdb-{{ version }}.tar.gz
  sha256: ed7a19a9ed14318c2237763fdbe2d274f88489cf82b7cfa4446b0b20296ec5b5

build:
  entry_points:
    - mlstdb = mlstdb.cli:mlstdb
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
  run_exports:
    - {{ pin_subpackage(name, max_pin='x.x') }}

requirements:
  host:
    - python
    - hatchling
    - pip
  run:
    - python >=3.0
    - click >=8.0.0
    - requests >=2.25.0
    - tqdm >=4.65.0
    - rauth >=0.7.3
    - configparser >=5.0.0
    - pyyaml >=6.0
    - mlst

test:
  imports:
    - mlstdb
  commands:
    - pip check
    - mlstdb --help
    - mlst --help
  requires:
    - pip

about:
  summary: A Python package to update and manage the MLST database for the MLST tool.
  home: https://github.com/himal2007/mlstdb
  dev_url: https://github.com/himal2007/mlstdb
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - himal2007
