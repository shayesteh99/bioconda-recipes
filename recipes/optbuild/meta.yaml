package:
  name: optbuild
  version: "0.2.3"

source:
  url: https://files.pythonhosted.org/packages/e4/07/b882a3ebbbcb774f4ed6f7728c1dbe924bb839ce9eca4c29828abc069013/optbuild-0.2.3.tar.gz
  sha256: 0bea93e2f9a3ddff1355ea0175f04fc1d961ac009e50b1e4fbcb05fc4f266cc7

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --ignore-installed --no-deps -vv
  run_exports:
    - {{ pin_subpackage("optbuild", max_pin="x.x") }}

requirements:
  host:
    - python
    - pip
    - setuptools
  run:
    - python
    - autolog
    - six

test:
  imports:
    - optbuild

about:
  home: http://noble.gs.washington.edu/~mmh1/software/optbuild/
  license: GNU GPLv2
  summary: 'build command lines for external programs'
