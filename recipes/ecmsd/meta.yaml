{% set name = "ECMSD" %}
{% set version = "1.2.0" %}
{% set sha256 = "4cc8c1d095ca53ca4d1a139079e9dfd482feed0121865731a772fe81c4f6d0e6" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: https://github.com/capoony/ECMSD/archive/refs/tags/v{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: generic
  run_exports:
    - {{ pin_subpackage("ecmsd", max_pin="x") }}

requirements:
  run:
    - minimap2
    - bbmap
    - r-base
    - r-tidyverse
    - r-gridextra
    - r-data.table
    - pigz
    - wget
    - python >=3.6
    - numpy

test:
  commands:
    - ECMSD --version
    - ECMSD --help

about:
  home: https://github.com/capoony/ECMSD
  dev_url: https://github.com/capoony/ECMSD
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Efficient Comprehensive Mitochondrial Sequence Detection Pipeline"
  description: |
    ECMSD detects and taxonomically classifies mitochondrial sequences
    from high-throughput sequencing data using minimap2 alignment and RMUS scoring.

extra:
  recipe-maintainers:
    - capoony
    - SarahSaadain
