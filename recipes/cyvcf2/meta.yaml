{% set name = "cyvcf2" %}
{% set version = "0.33.0" %}
{% set sha256 = "960d9b26468a88a5cc0842bf2b20bbf9881a4aaa90a0910102ee3c77f54f2652" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/cyvcf2-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  skip: True  # [py < 37]
  script:
    - export CFLAGS="${CFLAGS} -O3 -Wno-implicit-function-declaration -Wno-int-conversion"
    - export DYLD_LIBRARY_PATH="${BUILD_PREFIX}/lib:${DYLD_LIBRARY_PATH}"  # [osx]
    - export CYVCF2_HTSLIB_MODE=EXTERNAL
    - {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  entry_points:
    - cyvcf2 = cyvcf2.__main__:cli
  run_exports:
    - {{ pin_subpackage(name, max_pin="x.x") }}

requirements:
  build:
    - {{ compiler("c") }}
    - {{ stdlib("c") }}
    - cmake >=3.20
    - make
    - pkg-config
  host:
    - python
    - pip
    - scikit-build-core >=0.11
    - cython
    - htslib >=1.10
    - numpy >=2.0.0  # [py >= 39]
    - numpy  # [py < 39]
  run:
    - python
    - coloredlogs
    - click
    - {{ pin_compatible('numpy') }}

test:
  imports:
    - cyvcf2
  commands:
    - cyvcf2 --help

about:
  home: "https://github.com/brentp/cyvcf2"
  summary: "A cython wrapper around htslib built for fast parsing of Variant Call Format (VCF) files."
  license: MIT
  license_family: MIT
  license_file: LICENSE
  doc_url: "https://brentp.github.io/cyvcf2"
  dev_url: "https://github.com/brentp/cyvcf2"

extra:
  identifiers:
    - doi:10.1093/bioinformatics/btx057
    - biotools:cyvcf2
  additional-platforms:
    - linux-aarch64
    - osx-arm64
