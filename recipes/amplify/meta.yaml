{% set name = "amplify" %}
{% set version = "2.0.1" %}

package:
  name: '{{ name|lower }}'
  version: '{{ version }}'

source:
  url: https://github.com/BirolLab/AMPlify/archive/v{{ version }}.tar.gz
  sha256: 03dcc8b08955fbedaf933546de38246ad88c8798d12676899281bc22c1013643

build:
  number: 2
  noarch: generic
  run_exports:
    - {{ pin_subpackage(name, max_pin='x.x') }}

requirements:
  host:
    - python =3.6
  run:
    - python =3.6
    - keras =2.2.4
    - tensorflow >=1.10, <1.13
    - numpy <1.17
    - biopython
    - pandas
    - scikit-learn
    - h5py <3
    - absl-py <2

test:
  commands:
    - AMPlify -h
    - train_amplify -h

about:
  home: https://github.com/BirolLab/AMPlify
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE
  summary: Attentive deep learning model for antimicrobial peptide prediction
