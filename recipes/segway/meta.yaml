{% set name = "segway" %}
{% set version = "3.0.7" %}
{% set sha256 = "399453c72b8bd41ec2c58477ac01cd1a4e2a013e9315154554ef932d5b87ffab" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script_env:
    - SETUPTOOLS_SCM_PRETEND_VERSION={{ version }}
  entry_points:
    - segway = segway.run:main
    - segway-layer = segway.layer:main
    - segway-task = segway.task:main
    - segway-winner = segway.winner:main
  script:
    - export HDF5_DIR="$PREFIX"
    - {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir -vvv
  run_exports:
    - {{ pin_subpackage(name, max_pin="x") }}

requirements:
  host:
    - python >=3.10
    - pip
    - setuptools_scm
  run:
    - python >=3.10
    - six
    - genomedata
    - gmtk >=1.4.4
    - autolog
    - textinput
    - optbuild
    - optplus
    - palettable >=3.3.3
    - path.py
    - pytables >2.0.4
    - colorbrewer
    - drmaa >=0.4a3
    - ucsc-bedtobigbed
    - numpy

test:
  imports:
   - segway
  commands:
  - segway --version | grep {{ version }}
  - segway --help

about:
  home: "https://segway.hoffmanlab.org"
  license: "GPL-2.0-or-later"
  license_family: GPL
  license_file: LICENSE
  summary: "A tool for easy pattern discovery and identification in functional genomics data."
  doc_url: "https://segway.readthedocs.io/en/latest"
  dev_url: "https://github.com/hoffmangroup/segway"

extra:
  recipe-maintainers:
    - ericr86
  identifiers:
    - doi:10.1093/bioinformatics/btx603
    - biotools:segway
