{% set name = "pyprimer-ilps" %}
{% set version = "0.1.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/pyprimer_ilps-{{ version }}.tar.gz
  sha256: b58f0e7ffe2cc1776c74b9a55b9c7b8034ee8ba2a33f9eb854008116b38ad9f3
build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  run_exports:
    - {{ pin_subpackage('pyprimer-ilps', max_pin='x.x') }}

requirements:
  host:
    - python >=3.8
    - pip
    - setuptools
  run:
    - python >=3.8

test:
  imports:
    - pyprimer_ilps
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/RDRidenbaugh/PyPrimer
  summary: "A bioinformatic pipeline for intron length variation-based diagnostic multiplex PCR primer design."
  description: |
    PyPrimer-ILPs identifies intron length variation between multiple species for
    the purpose of designing diagnostic multiplex PCR primers. Originally
    implemented in Neodiprion sawflies, the methodology can be applied to
    any system with an NCBI annotated reference genome.
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  doc_url: https://github.com/RDRidenbaugh/PyPrimer
  dev_url: https://github.com/RDRidenbaugh/PyPrimer

extra:
  recipe-maintainers:
    - RDRidenbaugh
