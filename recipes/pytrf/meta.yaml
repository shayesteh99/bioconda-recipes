{% set name = "pytrf" %}
{% set version = "1.5.0" %}
{% set sha256 = "5b094aee65cddbba6ce6fb9885224b6bff885d40d8fc167007685c610db03570" %}

package:
  name: "{{ name|lower }}"
  version: "{{ version }}"

source:
  url: "https://github.com/lmdu/{{ name }}/archive/refs/tags/{{ version }}.tar.gz"
  sha256: "{{ sha256 }}"

build:
  number: 0
  script: "{{ PYTHON }} -m pip install . --ignore-installed --no-deps -vv"
  run_exports:
    - {{ pin_subpackage("pytrf", max_pin="x.x") }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
  host:
    - python {{ python }}
    - pip
    - setuptools
  run:
    - {{ pin_compatible("python") }}
    - pyfastx >=2.1

test:
  imports:
    - pytrf

about:
  home: "https://github.com/lmdu/pytrf"
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "a fast Python package for finding tandem repeat sequences"

extra:
  additional-platforms:
    - linux-aarch64
    - osx-arm64
